
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تجربة شقي يونج</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    direction: rtl;
    background: #0b0f1a;
    color: white;
}

.controls {
    margin: 15px;
}

canvas {
    background: black;
    border: 2px solid white;
    cursor: crosshair;
}

button {
    margin-top: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<h2>🔬 تجربة شقي يونج - نسخة متقدمة</h2>

<input id="name" placeholder="اسم الطالب">

<div class="controls">
<label>d (mm):
<input type="range" id="d" min="0.1" max="1" step="0.01" value="0.3">
<span id="dVal">0.3</span>
</label>

<label>D (m):
<input type="range" id="D" min="0.5" max="2" step="0.1" value="1">
<span id="DVal">1</span>
</label>

<label>λ (nm):
<input type="range" id="lambda" min="400" max="700" step="10" value="600">
<span id="lVal">600</span>
</label>

<button onclick="toggleMode()">وضع الاختبار</button>
</div>

<canvas id="screen" width="800" height="300"></canvas>

<h3>📏 القياس: <span id="measure">--</span> mm</h3>

<button onclick="sendData()">📤 إرسال النتيجة</button>

<script>
const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");

let points = [];
let testMode = false;

const GAS_URL = "https://script.google.com/macros/s/AKfycbzRwCBlRcvTcDRIBMvG0tH45mAhaak6ax4FTJ25GM7FbOPK9ih4QvhFMlm76uMfVvoI/exec";

function getColor(lambda) {
    let r=0,g=0,b=0;
    if (lambda>=380 && lambda<440){r=-(lambda-440)/(440-380);b=1;}
    else if(lambda<490){g=(lambda-440)/(490-440);b=1;}
    else if(lambda<510){g=1;b=-(lambda-510)/(510-490);}
    else if(lambda<580){r=(lambda-510)/(580-510);g=1;}
    else if(lambda<645){r=1;g=-(lambda-645)/(645-580);}
    else {r=1;}
    return `rgb(${r*255},${g*255},${b*255})`;
}

function draw() {
    let d = dSlider.value * 1e-3;
    let D = DSlider.value;
    let lambda = lSlider.value * 1e-9;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let color = getColor(lSlider.value);

    for(let y=0;y<canvas.height;y++){
        let x = y - canvas.height/2;
        let intensity = Math.cos(Math.PI * d * x/(lambda*D*500))**2;
        ctx.fillStyle = color.replace("rgb", "rgba").replace(")", `,${intensity})`);
        ctx.fillRect(0,y,canvas.width,1);
    }
}

canvas.addEventListener("click",(e)=>{
    points.push(e.offsetY);
    if(points.length==2){
        let diff = Math.abs(points[1]-points[0]);
        document.getElementById("measure").textContent = diff.toFixed(2);
        points=[];
    }
});

function toggleMode(){
    testMode = !testMode;
    lSlider.style.display = testMode ? "none":"inline";
}

function sendData(){
    let data = {
        name: document.getElementById("name").value,
        d: dSlider.value,
        D: DSlider.value,
        x: document.getElementById("measure").textContent,
        lambda: lSlider.value,
        error: Math.random()*5
    };

    fetch(GAS_URL,{
        method:"POST",
        body:JSON.stringify(data)
    }).then(()=>{
        alert("تم إرسال البيانات");
    });
}

dSlider.oninput = draw;
DSlider.oninput = draw;
lSlider.oninput = draw;

draw();
</script>

</body>
</html>
